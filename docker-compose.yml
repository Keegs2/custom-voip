# Voice Platform - Docker Compose Configuration
# Optimized for high-volume performance
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
#
version: '3.8'

services:
  # PostgreSQL with TimescaleDB and PgBouncer
  postgres:
    build: ./docker/postgres
    container_name: voip-postgres
    environment:
      POSTGRES_DB: voip
      POSTGRES_USER: voip
      POSTGRES_PASSWORD: voip_secret
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"   # Direct PostgreSQL
      - "6432:6432"   # PgBouncer
    networks:
      - voip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voip -d voip"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Redis - High-performance caching and real-time state
  redis:
    build: ./docker/redis
    container_name: voip-redis
    ports:
      - "6380:6379"  # Use 6380 on host to avoid conflict with local Redis
    volumes:
      - redis_data:/data
    networks:
      - voip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=65535
    restart: unless-stopped

  # FreeSWITCH - Core voice switch
  freeswitch:
    build: ./docker/freeswitch
    container_name: voip-freeswitch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=voip
      - DB_USER=freeswitch
      - DB_PASS=fs_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=api
      - API_PORT=8000
      # CRITICAL: These MUST be the VM's public IP, NOT auto-nat.
      # auto-nat inside Docker resolves to the container's IP (172.28.x.x),
      # NOT the host's public IP. SDP c= lines and SIP Contact/Via headers
      # must contain the public IP so Bandwidth can send RTP and SIP to us.
      - EXTERNAL_RTP_IP=${EXTERNAL_RTP_IP:-34.74.71.32}
      - EXTERNAL_SIP_IP=${EXTERNAL_SIP_IP:-34.74.71.32}
      - TEST_MODE=${TEST_MODE:-true}
    ports:
      - "5080:5080/udp"
      - "5080:5080/tcp"
      - "5081:5081/tcp"
      - "5090:5090/udp"   # External profile - carrier-facing outbound calls
      - "5090:5090/tcp"   # External profile - carrier-facing outbound calls
      - "8022:8021/tcp"   # Use 8022 on host to avoid conflict
      # RTP ports: MUST match rtp-start-port / rtp-end-port in switch.conf.xml
      # Each concurrent call needs 2 UDP ports per leg (RTP + RTCP).
      # FreeSWITCH as B2BUA has 2 legs per call = 4 ports per call.
      # 2000 ports = ~500 concurrent B2BUA calls.
      # For higher scale, switch FreeSWITCH to network_mode: host.
      - "16384-18383:16384-18383/udp"
    volumes:
      # drachtio image uses /usr/local/freeswitch/conf
      # Note: not read-only because entrypoint script needs to modify config
      - ./docker/freeswitch/conf:/usr/local/freeswitch/conf
      - ./docker/freeswitch/scripts:/usr/local/freeswitch/scripts
      - freeswitch_logs:/var/log/freeswitch
    networks:
      - voip-network
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      core:
        soft: -1
        hard: -1
    restart: unless-stopped

  # FastAPI - REST API layer
  api:
    build: ./docker/api
    container_name: voip-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://api:api_secret@postgres:5432/voip
      - REDIS_URL=redis://redis:6379
      - FREESWITCH_ESL_HOST=freeswitch
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=ClueCon
      - TEST_MODE=true
    ports:
      - "8088:8000"  # Use 8088 on host to avoid conflict with other services
    volumes:
      - ./docker/api/src:/app:ro
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Kamailio SBC - Front-end signaling security and rate limiting
  # Entry point for all external SIP traffic (Bandwidth -> Kamailio -> FreeSWITCH)
  # Uses host networking so it sees real source IPs (not Docker NAT)
  kamailio:
    build: ./docker/kamailio
    container_name: voip-kamailio
    depends_on:
      - freeswitch
    network_mode: host
    environment:
      - EXTERNAL_SIP_IP=${EXTERNAL_SIP_IP:-34.74.71.32}
    extra_hosts:
      - "freeswitch:172.28.0.7"
    volumes:
      - ./docker/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./docker/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  # Homer 7 SIP Monitoring — proper 3-service stack
  # Default login: admin / sipcapture
  homer-db:
    image: postgres:14-alpine
    container_name: voip-homer-db
    environment:
      POSTGRES_PASSWORD: homerSeven
      POSTGRES_USER: root
    volumes:
      - homer_db_data:/var/lib/postgresql/data
      - ./docker/homer/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    networks:
      - voip-network
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -U root -c '\\l'"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  heplify-server:
    image: ghcr.io/sipcapture/heplify-server
    container_name: voip-heplify-server
    ports:
      - "9060:9060"
      - "9060:9060/udp"
      - "9061:9061/tcp"
    environment:
      - "HEPLIFYSERVER_HEPADDR=0.0.0.0:9060"
      - "HEPLIFYSERVER_HEPTCPADDR=0.0.0.0:9061"
      - "HEPLIFYSERVER_DBSHEMA=homer7"
      - "HEPLIFYSERVER_DBDRIVER=postgres"
      - "HEPLIFYSERVER_DBADDR=homer-db:5432"
      - "HEPLIFYSERVER_DBUSER=root"
      - "HEPLIFYSERVER_DBPASS=homerSeven"
      - "HEPLIFYSERVER_LOGLVL=info"
      - "HEPLIFYSERVER_LOGSTD=true"
    depends_on:
      homer-db:
        condition: service_healthy
    networks:
      - voip-network
    restart: unless-stopped

  homer-webapp:
    image: ghcr.io/sipcapture/homer-app
    container_name: voip-homer-webapp
    ports:
      - "9080:80"
    environment:
      - "DB_HOST=homer-db"
      - "DB_USER=root"
      - "DB_PASS=homerSeven"
      - "HOMER_LOGLEVEL=info"
    volumes:
      - ./docker/homer/bootstrap:/app/bootstrap
    depends_on:
      homer-db:
        condition: service_healthy
    networks:
      - voip-network
    restart: unless-stopped

  # Webhook test server
  webhook-test:
    build: ./docker/webhook-test
    container_name: voip-webhook-test
    ports:
      - "9000:9000"
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped

  # SIPp load testing microservice
  sipp:
    build: ./docker/sipp
    container_name: voip-sipp
    depends_on:
      - freeswitch
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    restart: unless-stopped

  # Web UI for RCF management
  ui:
    build: ./docker/ui
    container_name: voip-ui
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped

networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  freeswitch_logs:
    driver: local
  homer_db_data:
    driver: local
