# Voice Platform - Docker Compose Configuration
# Optimized for high-volume performance
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
#
version: '3.8'

services:
  # PostgreSQL with TimescaleDB and PgBouncer
  postgres:
    build: ./docker/postgres
    container_name: voip-postgres
    environment:
      POSTGRES_DB: voip
      POSTGRES_USER: voip
      POSTGRES_PASSWORD: voip_secret
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"   # Direct PostgreSQL
      - "6432:6432"   # PgBouncer
    networks:
      - voip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voip -d voip"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Redis - High-performance caching and real-time state
  redis:
    build: ./docker/redis
    container_name: voip-redis
    ports:
      - "6380:6379"  # Use 6380 on host to avoid conflict with local Redis
    volumes:
      - redis_data:/data
    networks:
      - voip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=65535
    restart: unless-stopped

  # FreeSWITCH - Core voice switch
  freeswitch:
    build: ./docker/freeswitch
    container_name: voip-freeswitch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=voip
      - DB_USER=freeswitch
      - DB_PASS=fs_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=api
      - API_PORT=8000
      - EXTERNAL_RTP_IP=${EXTERNAL_RTP_IP:-auto-nat}
      - EXTERNAL_SIP_IP=${EXTERNAL_SIP_IP:-auto-nat}
      - TEST_MODE=${TEST_MODE:-true}
    ports:
      - "5080:5080/udp"
      - "5080:5080/tcp"
      - "5081:5081/tcp"
      - "8022:8021/tcp"  # Use 8022 on host to avoid conflict
      # RTP ports - use host networking in production
      - "16384-16484:16384-16484/udp"
    volumes:
      # drachtio image uses /usr/local/freeswitch/conf
      # Note: not read-only because entrypoint script needs to modify config
      - ./docker/freeswitch/conf:/usr/local/freeswitch/conf
      - ./docker/freeswitch/scripts:/usr/local/freeswitch/scripts
      - freeswitch_logs:/var/log/freeswitch
    networks:
      - voip-network
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      core:
        soft: -1
        hard: -1
    restart: unless-stopped

  # FastAPI - REST API layer
  api:
    build: ./docker/api
    container_name: voip-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://api:api_secret@postgres:5432/voip
      - REDIS_URL=redis://redis:6379
      - FREESWITCH_ESL_HOST=freeswitch
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=ClueCon
      - TEST_MODE=true
    ports:
      - "8088:8000"  # Use 8088 on host to avoid conflict with other services
    volumes:
      - ./docker/api/src:/app:ro
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Kamailio SBC - Front-end signaling security and rate limiting
  # Entry point for all external SIP traffic (Bandwidth -> Kamailio -> FreeSWITCH)
  # Uses host networking so it sees real source IPs (not Docker NAT)
  kamailio:
    build: ./docker/kamailio
    container_name: voip-kamailio
    depends_on:
      - freeswitch
    network_mode: host
    environment:
      - EXTERNAL_SIP_IP=${EXTERNAL_SIP_IP:-34.74.71.32}
    extra_hosts:
      - "freeswitch:172.28.0.7"
    volumes:
      - ./docker/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./docker/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  # Homer SIP Capture Server (heplify-server)
  # Receives HEP packets from Kamailio and stores SIP traces in PostgreSQL
  # Default login: admin / admin
  homer-db:
    image: postgres:16-alpine
    container_name: voip-homer-db
    environment:
      POSTGRES_DB: homer
      POSTGRES_USER: homer
      POSTGRES_PASSWORD: homer_secret
    volumes:
      - homer_db_data:/var/lib/postgresql/data
    networks:
      - voip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homer -d homer"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  homer-server:
    image: sipcapture/heplify-server:latest
    container_name: voip-homer-server
    ports:
      - "9060:9060/udp"   # HEP UDP
      - "9060:9060/tcp"   # HEP TCP
    environment:
      - HEPLIFYSERVER_HEPADDR=0.0.0.0:9060
      - HEPLIFYSERVER_DBSHEMA=homer7
      - HEPLIFYSERVER_DBDRIVER=postgres
      - HEPLIFYSERVER_DBADDR=homer-db:5432
      - HEPLIFYSERVER_DBUSER=homer
      - HEPLIFYSERVER_DBPASS=homer_secret
      - HEPLIFYSERVER_DBDATATABLE=homer_data
      - HEPLIFYSERVER_DBCONFTABLE=homer_config
      - HEPLIFYSERVER_DBDROPDAYS=14
      - HEPLIFYSERVER_LOGLVL=info
      - HEPLIFYSERVER_LOGSTD=true
    depends_on:
      homer-db:
        condition: service_healthy
    networks:
      - voip-network
    restart: unless-stopped

  homer-ui:
    image: sipcapture/homer-webapp:latest
    container_name: voip-homer-ui
    ports:
      - "9080:80"
    environment:
      - DB_HOST=homer-db
      - DB_USER=homer
      - DB_PASS=homer_secret
      - DB_PORT=5432
    depends_on:
      homer-db:
        condition: service_healthy
      homer-server:
        condition: service_started
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Webhook test server
  webhook-test:
    build: ./docker/webhook-test
    container_name: voip-webhook-test
    ports:
      - "9000:9000"
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped

  # SIPp load testing microservice
  sipp:
    build: ./docker/sipp
    container_name: voip-sipp
    depends_on:
      - freeswitch
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    restart: unless-stopped

  # Web UI for RCF management
  ui:
    build: ./docker/ui
    container_name: voip-ui
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - voip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped

networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  freeswitch_logs:
    driver: local
  homer_db_data:
    driver: local
