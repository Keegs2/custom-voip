#!KAMAILIO
#
# Kamailio SBC Configuration - Production Ready
# Front-end SBC for High-Volume Voice Platform (500+ CPS target)
#
# Features:
# - SIP rate limiting (pike + htable)
# - Explicit topology hiding (header scrub in route[TO_CARRIER])
# - Attack prevention (sanity, scanner detection)
# - Load balancing to FreeSWITCH with failover
# - NAT traversal
# - Dialog tracking for in-dialog requests
# - Proper SIP timer tuning for carrier interconnect
#

####### Global Parameters #########

# Process/threading configuration
children=16
tcp_children=8

# TCP tuning
tcp_max_connections=4096
tcp_connection_lifetime=300
tcp_connect_timeout=10
tcp_send_timeout=3
tcp_accept_aliases=yes
tcp_async=yes
tcp_rd_buf_size=16384

# Memory is set via CMD args: -M (shared MB) -m (pkg MB)

# Logging
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

# Network
mhomed=1
auto_aliases=no

# SIP options
sip_warning=0
server_signature=no
user_agent_header="User-Agent: VoicePlatform-SBC"
server_header="Server: VoicePlatform-SBC"

# Listen addresses - advertise external IP so SIP headers show public IP
#!substdef "!ADVERTISE_IP!34.74.71.32!g"
listen=udp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
listen=tcp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061 advertise ADVERTISE_IP:5061
#!endif

# DNS - enable for Docker DNS resolution of service names (e.g., "freeswitch")
dns=yes
rev_dns=no
dns_try_ipv6=no
use_dns_cache=on
dns_cache_flags=1

# FreeSWITCH backend (Docker service name resolves via Docker DNS)
#!define FREESWITCH_IP "freeswitch"
#!define FREESWITCH_PORT 5080

# Bandwidth signaling IPs - trusted carrier sources
#!define BANDWIDTH_IP_1 "67.231.2.12"
#!define BANDWIDTH_IP_2 "216.82.238.134"
# Bandwidth uses multiple origination IPs across their network
#!define BANDWIDTH_NET_1 "67.231.0.0/16"
#!define BANDWIDTH_NET_2 "216.82.224.0/19"

# Internal sources — FreeSWITCH on host networking sends from VM's internal VPC IP
#!define DOCKER_NETWORK "172.28.0.0/16"
#!define LOCALHOST_NETWORK "127.0.0.0/8"
#!define GCE_INTERNAL_NETWORK "10.142.0.0/20"

# Rate limits - tuned for legitimate traffic patterns
# Max requests per second per IP
#!define PIKE_THRESHOLD 50
# Block duration in seconds (5 min)
#!define PIKE_TIMEOUT 300
# Hash table entry expiry
#!define HTABLE_AUTOEXPIRE 300

# Scanner detection thresholds
# Max failed auth attempts
#!define SCANNER_THRESHOLD 5
# Max OPTIONS per second
#!define OPTIONS_FLOOD_THRESHOLD 20

####### Modules Section ########

# Core modules
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "uac.so"
loadmodule "kemix.so"

# NAT traversal (nathelper requires usrloc)
loadmodule "usrloc.so"
loadmodule "nathelper.so"
# rtpengine.so NOT loaded - Kamailio is signaling-only, no media proxy
# RTP flows directly between Bandwidth and FreeSWITCH
# loadmodule "rtpengine.so"

# Security
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "ipops.so"

# Load balancing
loadmodule "dispatcher.so"

# Dialog tracking (needed for proper in-dialog routing)
loadmodule "dialog.so"

# Topology hiding - DISABLED
# topoh only encodes/masks headers (adding TH=div markers) but does NOT strip
# upstream routing headers. It conflicts with our explicit header cleanup in
# route[TO_CARRIER] by adding TH markers that must then be removed. Since we
# do full header scrubbing ourselves, topoh is unnecessary and counterproductive.
# loadmodule "topoh.so"

# Database (PostgreSQL for trunk IP authentication)
loadmodule "db_postgres.so"
loadmodule "sqlops.so"

# Statistics
loadmodule "statistics.so"
loadmodule "counters.so"

# SIP tracing via HEP to Homer
loadmodule "siptrace.so"

#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

####### Module Parameters ########

# ----- Transaction Module (tm) -----
# Tuned for carrier interconnect - fast failure detection
# Final response timeout 3s (carrier should respond fast)
# fr_timer: non-INVITE final response timeout
# Set to 30s for carrier interconnect (carriers need time to route)
modparam("tm", "fr_timer", 30000)
# INVITE final response 120s (allows for call setup)
modparam("tm", "fr_inv_timer", 120000)
# Wait timer for ACK 2s
modparam("tm", "wt_timer", 2000)
# Initial retransmit 500ms
modparam("tm", "retr_timer1", 500)
# Max retransmit interval 4s
modparam("tm", "retr_timer2", 4000)
# Verbose CANCEL timer
modparam("tm", "noisy_ctimer", 1)
# Reset timer on provisional
modparam("tm", "restart_fr_on_each_reply", 1)
# Auto-send 100 Trying
modparam("tm", "auto_inv_100", 1)
modparam("tm", "auto_inv_100_reason", "Trying")
# Pass 1xx responses
modparam("tm", "pass_provisional_replies", 1)

# ----- Record-Route Module -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)
# Double record-route for NAT
modparam("rr", "enable_double_rr", 1)

# ----- Pike (Rate Limiting) -----
# 1 second window
modparam("pike", "sampling_time_unit", 1)
modparam("pike", "reqs_density_per_unit", PIKE_THRESHOLD)
modparam("pike", "remove_latency", PIKE_TIMEOUT)

# ----- Hash Tables -----
# Blocked IPs (auto-expire after 300 seconds)
modparam("htable", "htable", "blocked=>size=12;autoexpire=300")
# Failed auth tracking for scanner detection
modparam("htable", "htable", "failedauth=>size=12;autoexpire=3600")
# IP reputation
modparam("htable", "htable", "ipreputation=>size=12;autoexpire=86400")
# Call tracking per IP
modparam("htable", "htable", "ipcalls=>size=12;autoexpire=60")

# ----- Dispatcher (Load Balancing) -----
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
# Failover support
modparam("dispatcher", "flags", 2)
# XAVP-based destination and context (Kamailio 5.8+ style)
modparam("dispatcher", "xavp_dst", "ds_dst")
modparam("dispatcher", "xavp_ctx", "ds_ctx")
# Ping every 5 seconds
modparam("dispatcher", "ds_ping_interval", 5)
# Probe inactive gateways
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_from", "sip:ping@voiceplatform.local")
# 3 failures = inactive
modparam("dispatcher", "ds_probing_threshold", 3)
# 3 successes = active
modparam("dispatcher", "ds_inactive_threshold", 3)
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=404;code=480")

# ----- Dialog Module -----
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "timeout_avp", "$avp(dlg_timeout)")
# 12 hour max call
modparam("dialog", "default_timeout", 43200)
modparam("dialog", "profiles_with_value", "caller")
# No DB persistence (stateless SBC)
modparam("dialog", "db_mode", 0)

# ----- NAT Helper -----
# NAT pinging disabled — SBC mode, no registered endpoints to ping
modparam("nathelper", "natping_interval", 0)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# ----- RTPEngine (Media Proxy) -----
# Use rtpengine for proper RTP handling - comment out if not using
#modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
#modparam("rtpengine", "rtpengine_disable_tout", 30)

# ----- Topology Hiding (DISABLED - see loadmodule section) -----
# topoh was masking internal IPs but conflicted with explicit header cleanup.
# Our route[TO_CARRIER] now handles all topology hiding via remove_hf() + append_hf().
# modparam("topoh", "mask_key", "VoicePlatformSecretKey2024")
# modparam("topoh", "mask_ip", "34.74.71.32")
# modparam("topoh", "mask_callid", 1)
# modparam("topoh", "uparam_name", "toph")
# modparam("topoh", "uparam_prefix", "sr-")

# ----- UAC (User Agent Client) -----
modparam("uac", "restore_mode", "auto")

# ----- SIP Trace (HEP to Homer) -----
# Kamailio uses host networking, so Homer's published port is on localhost
# Configuration follows the official Homer 7 wiki example for Kamailio
modparam("siptrace", "duplicate_uri", "sip:127.0.0.1:9060")
modparam("siptrace", "hep_mode_on", 1)
modparam("siptrace", "hep_version", 3)
modparam("siptrace", "hep_capture_id", 100)
modparam("siptrace", "trace_to_database", 0)
modparam("siptrace", "trace_flag", 22)
modparam("siptrace", "trace_on", 1)

# ----- PostgreSQL Database Connection -----
# Used for SIP trunk IP authentication (trunk_auth_ips table lookup)
# Kamailio uses host networking, so DB is on localhost via PgBouncer
# The freeswitch DB user has SELECT access on trunk tables
modparam("sqlops", "sqlcon", "trunk=>postgres://freeswitch:fs_secret@127.0.0.1:5432/voip")

# ----- Hash Table for Trunk CPS Rate Limiting -----
# Per-trunk CPS tracking: key = trunk_id, value = call count in current second
# autoexpire=2 ensures stale entries are cleaned up (2s window for safety)
modparam("htable", "htable", "trunk_cps=>size=10;autoexpire=2")

#!ifdef WITH_TLS
# ----- TLS Module -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")
modparam("tls", "tls_force_run", 1)
#!endif

####### Routing Logic ########

# Main request route
request_route {
    # Per-request logging
    xlog("L_INFO", ">>> $rm from $fu ($si:$sp) to $ru\n");

    # Trace all SIP messages to Homer via HEP (flag 22 = trace_flag)
    setflag(22);
    sip_trace();

    # Enforce max forwards
    if (!mf_process_maxfwd_header("10")) {
        xlog("L_WARN", "Too many hops: $fu -> $ru\n");
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Determine if source is trusted (Bandwidth carrier or internal FreeSWITCH)
    # Flag 5 = trusted source (skip rate limiting and attack detection)
    if ($si == BANDWIDTH_IP_1 || $si == BANDWIDTH_IP_2 || is_in_subnet($si, BANDWIDTH_NET_1) || is_in_subnet($si, BANDWIDTH_NET_2)) {
        setflag(5);
        xlog("L_INFO", "Trusted source: Bandwidth $si\n");
    } else if (is_in_subnet($si, DOCKER_NETWORK) || is_in_subnet($si, LOCALHOST_NETWORK) || is_in_subnet($si, GCE_INTERNAL_NETWORK)) {
        setflag(5);  # Trusted: Docker internal network (FreeSWITCH)
        xlog("L_DEBUG", "Trusted source: Docker internal $si\n");
    }

    # Check if source IP is blocked (skip for trusted sources)
    if (!isflagset(5) && $sht(blocked=>$si) != $null) {
        xlog("L_WARN", "Blocked IP attempt: $si\n");
        # Silently drop - don't even respond (makes scanning harder)
        exit;
    }

    # Sanity checks - detect malformed SIP (always check, even trusted)
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp - $rm\n");
        if (!isflagset(5)) {
            $sht(ipreputation=>$si) = $sht(ipreputation=>$si) + 1;
            if ($sht(ipreputation=>$si) > 10) {
                $sht(blocked=>$si) = 1;
                xlog("L_WARN", "Blocking IP due to malformed SIP: $si\n");
            }
        }
        exit;
    }

    # Rate limiting with pike - SKIP for trusted sources (Bandwidth, FreeSWITCH)
    if (!isflagset(5)) {
        if (!pike_check_req()) {
            xlog("L_WARN", "Rate limit exceeded: $si ($rm)\n");
            $sht(blocked=>$si) = 1;
            sl_send_reply("503", "Service Unavailable - Rate Limited");
            exit;
        }

        # Scanner/attack detection - only for untrusted sources
        route(SCANNER_DETECT);
    }

    # CANCEL handling - must be processed before t_precheck_trans
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Retransmission handling
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Handle in-dialog requests (BYE, re-INVITE, etc.)
    if (has_totag()) {
        route(WITHINDIALOG);
        exit;
    }

    # ---- Initial requests (no to-tag) ----

    # Record route for dialog-initiating requests so Kamailio stays in
    # the signaling path for in-dialog requests (BYE, re-INVITE, etc.)
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle REGISTER - we don't accept registrations (Bandwidth uses IP auth)
    if (is_method("REGISTER")) {
        xlog("L_INFO", "Rejecting REGISTER from $si\n");
        sl_send_reply("403", "Forbidden - Registration Not Accepted");
        exit;
    }

    # Handle OPTIONS - respond for health checks
    if (is_method("OPTIONS")) {
        if (!isflagset(5)) {
            # Track OPTIONS floods (scanner behavior) only from untrusted sources
            $sht(ipcalls=>$si::options) = $sht(ipcalls=>$si::options) + 1;
            if ($sht(ipcalls=>$si::options) > OPTIONS_FLOOD_THRESHOLD) {
                xlog("L_WARN", "OPTIONS flood from $si - blocking\n");
                $sht(blocked=>$si) = 1;
                exit;
            }
        }
        sl_send_reply("200", "OK");
        exit;
    }

    # Reject unsupported methods
    if (!is_method("INVITE|ACK|BYE|CANCEL|PRACK|NOTIFY|REFER|MESSAGE|SUBSCRIBE|UPDATE|INFO")) {
        xlog("L_WARN", "Unsupported method $rm from $si\n");
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # --- Source-based INVITE routing ---
    if (is_method("INVITE")) {
        # Set dialog flag for tracking
        setflag(4);

        if ($si == BANDWIDTH_IP_1 || $si == BANDWIDTH_IP_2 || is_in_subnet($si, BANDWIDTH_NET_1) || is_in_subnet($si, BANDWIDTH_NET_2)) {
            # INBOUND: Bandwidth -> Kamailio -> FreeSWITCH
            # NAT detection for inbound carrier traffic
            route(NAT_DETECT);
            xlog("L_INFO", "Inbound INVITE from Bandwidth ($si) to $rU\n");
            route(DISPATCH);
        } else if (is_in_subnet($si, DOCKER_NETWORK) || is_in_subnet($si, LOCALHOST_NETWORK) || is_in_subnet($si, GCE_INTERNAL_NETWORK)) {
            # Distinguish FreeSWITCH (outbound) from SIPp/test tools (inbound test)
            # FreeSWITCH sends User-Agent: VoicePlatform/1.0 or FreeSWITCH
            # SIPp sends User-Agent: SIPp (or similar)
            if ($ua =~ "VoicePlatform" || $ua =~ "FreeSWITCH") {
                # OUTBOUND: FreeSWITCH -> Kamailio -> Bandwidth
                #
                # CRITICAL: Do NOT call route(NAT_DETECT) here.
                # NAT_DETECT calls force_rport() and fix_nated_contact(),
                # which cause two corruptions:
                #   1. force_rport() triggers Kamailio's core to add
                #      ;received=172.28.0.10;rport=5090 to FS's Via header.
                #      This annotation leaks Docker IPs and, when combined
                #      with Via line folding, merges with Max-Forwards.
                #   2. fix_nated_contact() rewrites FS's clean Contact
                #      (sip:mod_sofia@34.74.71.32:5090) to use the Docker
                #      source IP (172.28.0.10), which then appears as a raw
                #      line merged with Content-Type in the relayed INVITE.
                #
                # FreeSWITCH already sends correct public IPs via ext-sip-ip
                # and ext-rtp-ip. No NAT fixup is needed for outbound traffic.
                # Check if this is a trunk inbound delivery to a customer PBX
                # X-PBX-Dest header set by inbound_router.lua for trunk DID calls
                if (is_present_hf("X-PBX-Dest")) {
                    $var(pbx_ip) = $hdr(X-PBX-Dest);
                    xlog("L_INFO", "Trunk inbound delivery: routing to PBX at $var(pbx_ip)\n");

                    # Set destination to customer PBX IP
                    $du = "sip:" + $var(pbx_ip) + ":5060";
                    $rd = $var(pbx_ip);

                    # Remove internal header before sending to PBX
                    remove_hf("X-PBX-Dest");

                    # Record-route so in-dialog requests come back through us
                    record_route();

                    t_on_failure("TRUNK_DELIVERY_FAILURE");

                    if (!t_relay()) {
                        xlog("L_ERR", "Failed to relay to PBX $var(pbx_ip)\n");
                        sl_send_reply("503", "Service Unavailable");
                    }
                    exit;
                }

                xlog("L_INFO", "Outbound INVITE from FreeSWITCH ($si) to $rU via $du\n");
                route(TO_CARRIER);
            } else {
                # TEST TRAFFIC: SIPp or other internal test tools -> treat as inbound
                route(NAT_DETECT);
                xlog("L_INFO", "Test INVITE from $si (UA: $ua) to $rU - dispatching to FreeSWITCH\n");
                route(DISPATCH);
            }
        } else {
            # UNKNOWN source — could be a SIP trunk customer (PBX)
            # Try IP-based trunk authentication before rejecting
            route(TRUNK_AUTH);
            # If TRUNK_AUTH returns (didn't exit), the IP is not authorized
            xlog("L_WARN", "INVITE from untrusted source: $si\n");
            sl_send_reply("403", "Forbidden");
            exit;
        }
        exit;
    }

    # Non-INVITE initial requests from untrusted sources
    if (!isflagset(5)) {
        xlog("L_WARN", "Non-INVITE initial request $rm from untrusted $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Other initial requests from trusted sources - dispatch to FreeSWITCH
    route(DISPATCH);
}

# Within-dialog request handling
route[WITHINDIALOG] {
    if (!loose_route()) {
        # Not a properly routed request
        if (is_method("ACK")) {
            # ACK without Route - check if we have the transaction
            if (t_check_trans()) {
                route(RELAY);
                exit;
            }
            # Orphan ACK - drop silently
            exit;
        }
        xlog("L_WARN", "In-dialog $rm without Route from $si\n");
        sl_send_reply("404", "Not Found");
        exit;
    }

    # Validate dialog exists (if using dialog module)
    if (is_method("BYE|CANCEL")) {
        xlog("L_INFO", "$rm in dialog: $ci\n");
    }

    # Handle re-INVITEs (hold, codec changes, etc.)
    if (is_method("INVITE")) {
        # NAT handling ONLY for re-INVITEs from external sources (Bandwidth).
        # Do NOT apply NAT_DETECT to re-INVITEs from FreeSWITCH (Docker network)
        # because fix_nated_contact() would overwrite FS's clean Contact
        # (containing public IP via ext-sip-ip) with the Docker source IP.
        if (!is_in_subnet($si, DOCKER_NETWORK) && !is_in_subnet($si, LOCALHOST_NETWORK) && !is_in_subnet($si, GCE_INTERNAL_NETWORK)) {
            route(NAT_DETECT);
        }
        record_route();
    }

    # Topology hiding for in-dialog requests from FreeSWITCH heading outbound
    # to Bandwidth. Covers re-INVITE (hold/unhold, codec change), BYE, UPDATE.
    # With sofia/internal bridging, sip:gw+ patterns should not occur, but
    # the cleanup is kept as defense-in-depth.
    if (is_in_subnet($si, DOCKER_NETWORK) || is_in_subnet($si, LOCALHOST_NETWORK) || is_in_subnet($si, GCE_INTERNAL_NETWORK)) {
        # Rewrite Contact header containing Docker IPs
        subst("/^Contact:[ \t]+[^\r\n]*172\.28\.[^\r\n]*\r?\n//");
        subst("/^Contact:[ \t]+[^\r\n]*sip:gw\+[^\r\n]*\r?\n//");
        msg_apply_changes();
        append_hf("Contact: <sip:$fU@ADVERTISE_IP:5060;transport=udp>\r\n");

        # Rewrite Docker internal IPs in SDP (re-INVITE, UPDATE with SDP)
        if (has_body("application/sdp")) {
            subst_body('/IN IP4 172\.28\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
            subst_body('/IN IP4 10\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
            subst_body('/IN IP4 127\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
        }
        xlog("L_DEBUG", "Topology-hid in-dialog $rm from Docker source $si\n");
    }

    # Sequential request - relay it
    route(RELAY);
    exit;
}

# NAT detection and handling
# Ensures external-facing SIP headers show the public IP, not Docker internal IPs
route[NAT_DETECT] {
    force_rport();

    if (nat_uac_test("19")) {  # Check private IP in Contact, Via received
        xlog("L_DEBUG", "NAT detected for $si\n");
        setbflag(6);  # Mark as NATted

        # Fix Contact header to use public IP
        if (is_method("INVITE|REGISTER|SUBSCRIBE")) {
            fix_nated_contact();
        }

        # Store original source for later
        $avp(RECEIVED) = $su;
    }
}

# Scanner/Attack detection
route[SCANNER_DETECT] {
    # Track authentication failures
    # This would be called after auth failure - placeholder for when we add auth

    # Detect INVITE floods (likely scanner or DoS)
    if (is_method("INVITE")) {
        $sht(ipcalls=>$si::inv) = $sht(ipcalls=>$si::inv) + 1;
        if ($sht(ipcalls=>$si::inv) > 30) {  # 30 INVITE/minute is suspicious
            xlog("L_WARN", "INVITE flood detected from $si\n");
            $sht(blocked=>$si) = 1;
            sl_send_reply("503", "Service Unavailable");
            exit;
        }
    }

    # Detect scanning patterns (sequential destinations)
    # Would need more sophisticated tracking in production
}

# ====================================================================
# SIP Trunk IP Authentication
# ====================================================================
# Authenticates outbound trunk calls from customer PBXs by source IP.
# Queries trunk_auth_ips table to find the matching trunk, then validates
# the trunk is enabled and applies CPS rate limiting.
#
# Call Flow:
#   Customer PBX (static IP) -> Kamailio:5060
#     -> IP lookup in trunk_auth_ips table
#     -> Verify trunk is enabled (sip_trunks.enabled = true)
#     -> Enforce per-trunk CPS rate limit
#     -> Set X-Trunk-ID and X-Customer-ID headers for FreeSWITCH
#     -> Dispatch to FreeSWITCH (same path as carrier inbound)
#     -> FreeSWITCH runs trunk_outbound.lua
#
# If authentication fails, the route returns (falls through) and the
# caller in request_route sends 403 Forbidden.
# If authentication succeeds, the route dispatches to FreeSWITCH and exits.
#
route[TRUNK_AUTH] {
    xlog("L_INFO", "Trunk auth check for IP: $si\n");

    # ----------------------------------------------------------------
    # Step 1: Look up source IP in trunk_auth_ips table
    # ----------------------------------------------------------------
    # Query joins trunk_auth_ips -> sip_trunks -> customers to get
    # trunk_id, customer_id, enabled status, and CPS limit in one query.
    # The INET column type in PostgreSQL handles IP comparison correctly.
    # We cast the IP string to INET for proper matching.
    sql_query("trunk",
        "SELECT t.id, t.customer_id, t.enabled, t.cps_limit, t.max_channels \
         FROM trunk_auth_ips i \
         JOIN sip_trunks t ON i.trunk_id = t.id \
         WHERE i.ip_address = '$si' \
         AND t.enabled = true \
         LIMIT 1",
        "ra");

    # Check if we got a result
    if ($dbr(ra=>rows) == 0) {
        # No trunk found for this IP — return to caller for 403
        xlog("L_INFO", "No trunk found for IP $si\n");
        return;
    }

    # Extract trunk details from query result
    $var(trunk_id) = $dbr(ra=>[0,0]);
    $var(customer_id) = $dbr(ra=>[0,1]);
    $var(trunk_enabled) = $dbr(ra=>[0,2]);
    $var(cps_limit) = $dbr(ra=>[0,3]);
    $var(max_channels) = $dbr(ra=>[0,4]);

    xlog("L_INFO", "Trunk auth matched: trunk_id=$var(trunk_id) customer=$var(customer_id) cps_limit=$var(cps_limit)\n");

    # ----------------------------------------------------------------
    # Step 2: Verify trunk is enabled
    # ----------------------------------------------------------------
    # Defense-in-depth: the SQL WHERE already filters enabled=true,
    # but check the value explicitly in case of query quirks.
    if ($var(trunk_enabled) != "t" && $var(trunk_enabled) != "true" && $var(trunk_enabled) != "1") {
        xlog("L_WARN", "Trunk $var(trunk_id) is disabled, rejecting $si\n");
        sl_send_reply("403", "Forbidden - Trunk Disabled");
        exit;
    }

    # ----------------------------------------------------------------
    # Step 3: Per-trunk CPS rate limiting
    # ----------------------------------------------------------------
    # Use htable to track calls per second per trunk.
    # The trunk_cps htable has autoexpire=2 so stale counters are cleaned.
    # Key format: trunk_id::cps
    $sht(trunk_cps=>$var(trunk_id)::cps) = $sht(trunk_cps=>$var(trunk_id)::cps) + 1;
    if ($sht(trunk_cps=>$var(trunk_id)::cps) > $var(cps_limit)) {
        xlog("L_WARN", "CPS limit exceeded: trunk=$var(trunk_id) current=$sht(trunk_cps=>$var(trunk_id)::cps) limit=$var(cps_limit)\n");
        sl_send_reply("503", "Service Unavailable - CPS Limit Exceeded");
        exit;
    }

    # ----------------------------------------------------------------
    # Step 4: Set custom SIP headers for FreeSWITCH
    # ----------------------------------------------------------------
    # These headers tell FreeSWITCH which trunk/customer the call belongs to.
    # FreeSWITCH reads them as channel variables: sip_h_X-Trunk-ID, etc.
    # trunk_outbound.lua uses these to validate the DID, set caller ID,
    # and select the carrier gateway.
    append_hf("X-Trunk-ID: $var(trunk_id)\r\n");
    append_hf("X-Customer-ID: $var(customer_id)\r\n");
    append_hf("X-Max-Channels: $var(max_channels)\r\n");

    xlog("L_INFO", "Trunk $var(trunk_id) authenticated for IP $si, dispatching to FreeSWITCH\n");

    # ----------------------------------------------------------------
    # Step 5: Dispatch to FreeSWITCH
    # ----------------------------------------------------------------
    # Same dispatch path as carrier inbound — FreeSWITCH's dialplan
    # will detect the X-Trunk-ID header and route to trunk_outbound.lua
    route(DISPATCH);
    exit;
}

# Dispatch to FreeSWITCH (inbound from carrier)
route[DISPATCH] {
    # Select FreeSWITCH instance using dispatcher
    # Algorithm 4 = round-robin, 10 = weight-based, 11 = call-load
    if (!ds_select_dst("1", "4")) {
        xlog("L_ERR", "No FreeSWITCH available for $rm to $rU\n");
        sl_send_reply("503", "Service Unavailable - No Media Servers");
        exit;
    }

    xlog("L_INFO", "Dispatching to FreeSWITCH: $du\n");

    # Set failure route for failover
    t_on_failure("DISPATCH_FAILURE");

    route(RELAY);
}

# Route outbound to Bandwidth carrier (from FreeSWITCH)
#
# ARCHITECTURE:
#   Bandwidth --[A-leg]--> Kamailio --> FreeSWITCH (B2BUA)
#   FreeSWITCH --[B-leg]--> Kamailio --> Bandwidth
#
# FreeSWITCH is the B2BUA that originates the B-leg INVITE.
# Kamailio proxies it to Bandwidth after topology hiding.
#
# DESIGN (clean headers at the source):
#   FreeSWITCH bridges with sofia/internal/dest@proxy instead of
#   sofia/gateway/carrier/dest. This eliminates:
#     - sip:gw+carrier_standard@... Contact corruption
#     - Gateway-specific Via/Contact formatting issues
#   FreeSWITCH passes the carrier choice via X-Carrier header:
#     - "standard" -> route to Bandwidth Dallas (BANDWIDTH_IP_1)
#     - "premium"  -> route to Bandwidth LA (BANDWIDTH_IP_2)
#     - "backup"   -> route to Bandwidth Dallas (BANDWIDTH_IP_1) as failover
#
#   Since the INVITE arrives with standard mod_sofia headers (using
#   ext-sip-ip for Via/Contact), Kamailio only needs to:
#     1. Select the correct Bandwidth IP based on X-Carrier
#     2. Rewrite From/To domains to the public IP
#     3. Replace Contact with Kamailio's address
#     4. Remove FS-specific headers
#     5. Fix SDP body IPs (defense-in-depth)
#     6. Add Homer correlation header
#
route[TO_CARRIER] {
    # ====================================================================
    # Step 1: Select Bandwidth IP based on X-Carrier header from FreeSWITCH
    # ====================================================================
    # FreeSWITCH sets X-Carrier in the bridge string to indicate which
    # carrier trunk to use. Map it to the correct Bandwidth signaling IP.
    $var(carrier_ip) = BANDWIDTH_IP_1;  # Default: Dallas
    if (is_present_hf("X-Carrier")) {
        if ($hdr(X-Carrier) == "premium") {
            $var(carrier_ip) = BANDWIDTH_IP_2;  # LA
            xlog("L_INFO", "X-Carrier=premium -> routing to Bandwidth LA $var(carrier_ip)\n");
        } else if ($hdr(X-Carrier) == "standard") {
            $var(carrier_ip) = BANDWIDTH_IP_1;  # Dallas
            xlog("L_INFO", "X-Carrier=standard -> routing to Bandwidth Dallas $var(carrier_ip)\n");
        } else if ($hdr(X-Carrier) == "backup") {
            $var(carrier_ip) = BANDWIDTH_IP_1;  # Backup also uses Dallas
            xlog("L_INFO", "X-Carrier=backup -> routing to Bandwidth Dallas (backup) $var(carrier_ip)\n");
        } else {
            xlog("L_WARN", "Unknown X-Carrier value '$hdr(X-Carrier)', using default Dallas\n");
        }
        # Remove X-Carrier before sending to carrier (internal header)
        remove_hf("X-Carrier");
    } else {
        xlog("L_WARN", "No X-Carrier header from FreeSWITCH, using default Dallas\n");
    }

    # Set destination to selected Bandwidth IP
    $rd = $var(carrier_ip);
    $rp = 5060;
    $du = "sip:" + $var(carrier_ip) + ":5060";
    xlog("L_INFO", "Outbound to Bandwidth: $du (R-URI: $ru)\n");

    # Save the B-leg Call-ID for Homer correlation
    $var(b_leg_callid) = $ci;

    # ====================================================================
    # Step 2: Rewrite From/To domains
    # ====================================================================
    # FreeSWITCH sets From as sip:+1xxx@172.28.0.1; carrier expects public IP.
    $fd = "ADVERTISE_IP";
    # FreeSWITCH sets To domain as the proxy address; rewrite to carrier IP.
    $td = $var(carrier_ip);

    # ====================================================================
    # Step 3: Remove FS-specific headers and replace with clean ones
    # ====================================================================
    # With sofia/internal bridging, FS sends standard headers (no sip:gw+
    # corruption), but we still need to present Kamailio's identity to the
    # carrier and remove FS-internal headers.
    remove_hf("P-Asserted-Identity");
    remove_hf("User-Agent");
    remove_hf("X-FS-Support");
    remove_hf("Content-Disposition");
    remove_hf("Privacy");
    remove_hf("Supported");
    remove_hf("Allow-Events");
    remove_hf("Allow");
    remove_hf("Contact");

    # Apply changes to rebuild the message buffer before adding new headers
    msg_apply_changes();

    # ====================================================================
    # Step 4: Remove FreeSWITCH Via header (defense-in-depth)
    # ====================================================================
    # When Kamailio proxies a request, it adds its own Via and the upstream
    # (FS) Via becomes Via[2] in the outbound message. If Kamailio's core
    # already annotated FS's Via with ;received=172.28.x.x (because the
    # packet arrived from a Docker IP that differs from the Via sent-by),
    # those parameters leak internal topology to the carrier.
    #
    # IMPORTANT: We use remove_hf_value() from textopsx instead of
    # subst() or remove_hf("Via"). The reason:
    #   - remove_hf("Via") removes the ENTIRE header line but leaves
    #     orphaned Via parameters (;received=...;rport=...) that merge
    #     with the next header, corrupting the message.
    #   - subst() regex is fragile against line folding and multi-value
    #     Via headers (comma-separated).
    #   - remove_hf_value("Via[N]") properly handles Via as a structured
    #     header, removing the complete value including all parameters.
    #
    # At this point in request_route, the message still has FS's original
    # Via as Via[1] (Kamailio has not yet added its own Via -- that happens
    # during t_relay()/forwarding). So we remove Via[1] which is FS's Via.
    #
    # After t_relay() adds Kamailio's Via as the new top Via, the outbound
    # message will have only Kamailio's Via -- clean, with the advertised
    # public IP and no Docker artifacts.
    # Do NOT manipulate Via headers — Kamailio's proxy behavior handles them
    # correctly per RFC 3261. Two Vias (Kamailio + FreeSWITCH) with ;received=
    # annotation is valid SIP. Bandwidth accepted this format previously.
    # The Content-Type fix (skipping NAT_DETECT for FS traffic) was the
    # critical fix. Via manipulation caused more corruption than it solved.

    # ====================================================================
    # Step 5: Build P-Asserted-Identity from X-Original-CID
    # ====================================================================
    # RCF call forwarding sets two identities:
    #   From ($fU):       RCF DID (Bandwidth requires this for termination auth)
    #   X-Original-CID:   Number for caller ID presentation to the called party
    #
    # When pass_caller_id=true:  X-Original-CID = original caller's number
    # When pass_caller_id=false: X-Original-CID = RCF DID (no passthrough)
    # Non-RCF calls:             X-Original-CID absent; fall back to $fU
    #
    # Save the CID value to a variable BEFORE header manipulation, then
    # remove the internal header and append the clean PAI.
    $var(pai_user) = $fU;  # Default: use From user
    if (is_present_hf("X-Original-CID")) {
        $var(pai_user) = $hdr(X-Original-CID);
        xlog("L_INFO", "RCF caller ID: From=$fU (carrier auth), PAI=$var(pai_user) (CID display)\n");
        remove_hf("X-Original-CID");
    } else {
        xlog("L_INFO", "No X-Original-CID header, PAI defaults to From user: $fU\n");
    }

    # ====================================================================
    # Step 6: Add clean outbound headers
    # ====================================================================
    # Present Kamailio's public IP as the SBC identity to Bandwidth.
    append_hf("Contact: <sip:$fU@ADVERTISE_IP:5060;transport=udp>\r\n");
    append_hf("P-Asserted-Identity: <sip:$var(pai_user)@ADVERTISE_IP>\r\n");
    append_hf("User-Agent: VoicePlatform-SBC/1.0\r\n");
    append_hf("Allow: INVITE,ACK,BYE,CANCEL,OPTIONS,PRACK,UPDATE\r\n");

    # ====================================================================
    # Step 7: Fix SDP body -- replace Docker/private IPs with public IP
    # ====================================================================
    # Defense-in-depth: ext-rtp-ip should handle this at the FS level,
    # but we scrub anyway in case any module injects RFC1918 addresses.
    if (has_body("application/sdp")) {
        subst_body('/IN IP4 172\.28\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
        subst_body('/IN IP4 10\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
        subst_body('/IN IP4 127\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
    }

    # ====================================================================
    # Step 8: Homer SIP capture correlation
    # ====================================================================
    # FreeSWITCH is a B2BUA, so the B-leg has a different Call-ID than the A-leg.
    # Homer shows them as separate call flows. Adding X-CID allows Homer's
    # correlation engine to link both legs into a single end-to-end diagram.
    append_hf("X-CID: $var(b_leg_callid)\r\n");

    # ====================================================================
    # Step 9: Relay to carrier
    # ====================================================================
    xlog("L_INFO", "Routing outbound to carrier: $ru From=$fu To=$tu CID=$ci\n");

    # Use a dedicated branch route for carrier-bound traffic.
    # TO_CARRIER_BRANCH executes per-branch right before the message is
    # forwarded. At that point, Kamailio's tm module has already:
    #   - Added its own Via (top Via in the outbound message)
    #   - Annotated the FS Via (now Via[2]) with ;received= if applicable
    # The branch route strips any residual ;received= and ;rport= from
    # Via[2] as a final safety net. This is defense-in-depth; the primary
    # fix is skipping NAT_DETECT above which prevents the annotation
    # entirely, and removing FS's Via in Step 4 above which removes it
    # from the message buffer before relay.
    t_on_branch("TO_CARRIER_BRANCH");
    t_on_failure("CARRIER_FAILURE");
    t_on_reply("REPLY_HANDLER");

    if (!t_relay()) {
        xlog("L_ERR", "Relay to carrier failed for $rm to $ru\n");
        sl_reply_error();
    }
    exit;
}

# Failure route for outbound carrier
failure_route[CARRIER_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    xlog("L_WARN", "Carrier delivery failed: $rs $rr to $ru\n");

    # If primary Bandwidth IP failed, try secondary
    if (t_check_status("500|503|408|480|404")) {
        if ($rd == BANDWIDTH_IP_1) {
            $rd = BANDWIDTH_IP_2;
            $rp = 5060;
            $du = "sip:" + BANDWIDTH_IP_2 + ":5060";
            xlog("L_WARN", "Failover to secondary Bandwidth IP: $du\n");
            t_on_failure("CARRIER_FAILURE");
            t_relay();
            exit;
        }
    }

    xlog("L_ERR", "All carrier endpoints failed for $ru\n");
}

# Relay route - send the request (used for inbound/generic traffic)
# Carrier-bound traffic from TO_CARRIER uses t_relay() directly with
# its own branch/failure/reply routes, so this route is only used for
# inbound (Bandwidth->FS) and other non-carrier relay paths.
route[RELAY] {
    if (is_method("INVITE")) {
        # Set branch failure handling
        t_on_branch("BRANCH_FAILURE");
        t_on_reply("REPLY_HANDLER");
    }

    if (!t_relay()) {
        xlog("L_ERR", "Relay failed for $rm to $ru\n");
        sl_reply_error();
    }
    exit;
}

# Reply handling
# CRITICAL: Do NOT blindly call fix_nated_contact() on all replies.
# FreeSWITCH replies arrive from Docker IPs (172.28.x.x) but already contain
# the correct public IP in Contact (via ext-sip-ip). fix_nated_contact()
# would rewrite that clean Contact to use the Docker source IP, breaking
# in-dialog routing for calls heading to Bandwidth.
#
# fix_nated_contact() is only appropriate for replies from endpoints behind
# NAT that do NOT know their public IP. FreeSWITCH knows its public IP
# (configured via ext-sip-ip) and sets it correctly. Kamailio's REPLY_HANDLER
# onreply_route handles topology scrubbing for replies heading to carriers.
reply_route {
    xlog("L_INFO", "<<< $rs $rr for $rm\n");

    # Trace all SIP replies to Homer via HEP
    sip_trace();

    # Do NOT call fix_nated_contact() here. FreeSWITCH sets correct public
    # IPs via ext-sip-ip. The onreply_route[REPLY_HANDLER] handles any
    # necessary SDP/Contact rewriting for carrier-bound replies.

    # Drop late 100 Trying (unnecessary network traffic)
    if (status == "100" && $T(id_label) != $null) {
        drop;
        exit;
    }
}

# Branch failure handler (generic, used by route[RELAY] for non-carrier traffic)
branch_route[BRANCH_FAILURE] {
    xlog("L_DEBUG", "Branch to $ru\n");
}

# Branch route for carrier-bound outbound traffic (from TO_CARRIER)
#
# This executes per-branch right before the message is forwarded to Bandwidth.
# At this point, Kamailio's tm module has constructed the outbound message:
#   - Kamailio's own Via is Via[1] (top Via, with advertised public IP)
#   - FreeSWITCH's Via (if still present) is Via[2]
#
# Defense-in-depth: strip any ;received= and ;rport= annotations from Via[2]
# that Kamailio's core may have added. The primary fix (skipping NAT_DETECT
# for FS outbound + removing FS's Via in request_route) should prevent these
# annotations entirely. This branch route is the final safety net.
branch_route[TO_CARRIER_BRANCH] {
    xlog("L_DEBUG", "Carrier branch to $ru\n");

    # Remove ;received= parameter from FS Via (Via[2]) if it exists.
    # Via[1] is Kamailio's own Via (clean, uses advertise IP).
    # Via[2] is FS's Via -- if it survived removal in request_route
    # (e.g., due to msg_apply_changes timing), clean it here.
    remove_hf_value("Via[2].received");
    remove_hf_value("Via[2].rport");
}

# Reply handler for INVITE
# Handles 180 Ringing, 183 Session Progress (early media), and 200 OK
# from FreeSWITCH heading back to Bandwidth.
#
# CRITICAL: Do NOT use fix_nated_contact() here. FreeSWITCH sets the
# correct public IP (34.74.71.32) in Contact via ext-sip-ip. The
# fix_nated_contact() function would OVERWRITE that with the Docker
# source IP (172.28.x.x) based on the packet's network-layer source,
# which breaks in-dialog routing when Bandwidth tries to send BYE/re-INVITE.
#
# Instead, we do targeted defense-in-depth rewriting:
#   1. SDP body: Replace any Docker IPs that leaked through (ext-rtp-ip
#      should prevent this, but we scrub as safety net)
#   2. Contact: Only rewrite if it actually contains a Docker IP
#      (should not happen with ext-sip-ip, but defense-in-depth)
onreply_route[REPLY_HANDLER] {
    xlog("L_INFO", "Reply $rs for INVITE\n");

    # Topology hiding for SIP responses from FreeSWITCH
    if (status =~ "^[12][0-9][0-9]$") {
        # Defense-in-depth: Rewrite Docker IPs in SDP body.
        # ext-rtp-ip should prevent these, but scrub as safety net.
        # This is essential for ringback (183 with SDP) and call audio (200 OK).
        if (has_body("application/sdp")) {
            subst_body('/IN IP4 172\.28\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
            subst_body('/IN IP4 10\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
            subst_body('/IN IP4 127\.[0-9]+\.[0-9]+\.[0-9]+/IN IP4 ADVERTISE_IP/g');
        }

        # Defense-in-depth: If Contact header somehow contains a Docker IP,
        # replace it. Do NOT use fix_nated_contact() which always overwrites.
        # These subst() patterns only fire if a Docker/private IP is present.
        subst("/^(Contact:[ \t]+.*)172\.28\.[0-9]+\.[0-9]+(.*)$/\1ADVERTISE_IP\2/");

        xlog("L_DEBUG", "Topology-hid $rs reply: scrubbed SDP and checked Contact\n");
    }
}

# Failure route for dispatcher failover
failure_route[DISPATCH_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    # Log the failure
    xlog("L_WARN", "Dispatch failed: $rs $rr\n");

    # Check if we should failover
    if (t_check_status("500|503|408")) {
        # Try next FreeSWITCH
        if (ds_next_dst()) {
            xlog("L_WARN", "Failover to $du\n");

            # Mark the failed destination as probing
            ds_mark_dst("p");

            t_on_failure("DISPATCH_FAILURE");
            t_relay();
            exit;
        }
    }

    # No more destinations or non-recoverable error
    xlog("L_ERR", "All FreeSWITCH instances failed\n");

    # Return appropriate error to caller
    if (t_check_status("4[0-9][0-9]")) {
        # 4xx - client error, pass through
        exit;
    }

    send_reply("503", "Service Unavailable");
}

# Failure route for trunk inbound delivery to customer PBX
failure_route[TRUNK_DELIVERY_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }
    xlog("L_ERR", "Trunk delivery to PBX failed: $rs $rr\n");
    send_reply("503", "Service Unavailable - PBX Unreachable");
}

# Event route for dialog end
event_route[dialog:end] {
    xlog("L_INFO", "Dialog ended: $ci duration=$DLG_lifetime\n");
}

# Stats route for monitoring
event_route[htable:mod-init] {
    xlog("L_INFO", "Hash tables initialized\n");
}
