#!KAMAILIO
#
# Kamailio SBC Configuration - Production Ready
# Front-end SBC for High-Volume Voice Platform (500+ CPS target)
#
# Features:
# - SIP rate limiting (pike + htable)
# - Topology hiding (topoh)
# - Attack prevention (sanity, scanner detection)
# - Load balancing to FreeSWITCH with failover
# - NAT traversal
# - Dialog tracking for in-dialog requests
# - Proper SIP timer tuning for carrier interconnect
#

####### Global Parameters #########

# Process/threading configuration
children=16
tcp_children=8

# TCP tuning
tcp_max_connections=4096
tcp_connection_lifetime=300
tcp_connect_timeout=10
tcp_send_timeout=3
tcp_accept_aliases=yes
tcp_async=yes
tcp_rd_buf_size=16384

# Memory is set via CMD args: -M (shared MB) -m (pkg MB)

# Logging
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

# Network
mhomed=1
auto_aliases=no

# SIP options
sip_warning=0
server_signature=no
user_agent_header="User-Agent: VoicePlatform-SBC"
server_header="Server: VoicePlatform-SBC"

# Listen addresses - advertise external IP so SIP headers show public IP
#!substdef "!ADVERTISE_IP!34.74.71.32!g"
listen=udp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
listen=tcp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061 advertise ADVERTISE_IP:5061
#!endif

# DNS - enable for Docker DNS resolution of service names (e.g., "freeswitch")
dns=yes
rev_dns=no
dns_try_ipv6=no
use_dns_cache=on
dns_cache_flags=1

# FreeSWITCH backend (Docker service name resolves via Docker DNS)
#!define FREESWITCH_IP "freeswitch"
#!define FREESWITCH_PORT 5080

# Bandwidth signaling IPs - trusted carrier sources
#!define BANDWIDTH_IP_1 "67.231.2.12"
#!define BANDWIDTH_IP_2 "216.82.238.134"
# Bandwidth uses multiple origination IPs across their network
#!define BANDWIDTH_NET_1 "67.231.0.0/16"
#!define BANDWIDTH_NET_2 "216.82.224.0/19"

# Internal sources (FreeSWITCH via host networking reaches us from localhost or Docker bridge)
#!define DOCKER_NETWORK "172.28.0.0/16"
#!define LOCALHOST_NETWORK "127.0.0.0/8"

# Rate limits - tuned for legitimate traffic patterns
# Max requests per second per IP
#!define PIKE_THRESHOLD 50
# Block duration in seconds (5 min)
#!define PIKE_TIMEOUT 300
# Hash table entry expiry
#!define HTABLE_AUTOEXPIRE 300

# Scanner detection thresholds
# Max failed auth attempts
#!define SCANNER_THRESHOLD 5
# Max OPTIONS per second
#!define OPTIONS_FLOOD_THRESHOLD 20

####### Modules Section ########

# Core modules
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "uac.so"
loadmodule "kemix.so"

# NAT traversal (nathelper requires usrloc)
loadmodule "usrloc.so"
loadmodule "nathelper.so"
# rtpengine.so NOT loaded - Kamailio is signaling-only, no media proxy
# RTP flows directly between Bandwidth and FreeSWITCH
# loadmodule "rtpengine.so"

# Security
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "ipops.so"

# Load balancing
loadmodule "dispatcher.so"

# Dialog tracking (needed for proper in-dialog routing)
loadmodule "dialog.so"

# Topology hiding
loadmodule "topoh.so"

# Statistics
loadmodule "statistics.so"
loadmodule "counters.so"

#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

####### Module Parameters ########

# ----- Transaction Module (tm) -----
# Tuned for carrier interconnect - fast failure detection
# Final response timeout 3s (carrier should respond fast)
modparam("tm", "fr_timer", 3000)
# INVITE final response 120s (allows for call setup)
modparam("tm", "fr_inv_timer", 120000)
# Wait timer for ACK 2s
modparam("tm", "wt_timer", 2000)
# Initial retransmit 500ms
modparam("tm", "retr_timer1", 500)
# Max retransmit interval 4s
modparam("tm", "retr_timer2", 4000)
# Verbose CANCEL timer
modparam("tm", "noisy_ctimer", 1)
# Reset timer on provisional
modparam("tm", "restart_fr_on_each_reply", 1)
# Auto-send 100 Trying
modparam("tm", "auto_inv_100", 1)
modparam("tm", "auto_inv_100_reason", "Trying")
# Pass 1xx responses
modparam("tm", "pass_provisional_replies", 1)

# ----- Record-Route Module -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)
# Double record-route for NAT
modparam("rr", "enable_double_rr", 1)

# ----- Pike (Rate Limiting) -----
# 1 second window
modparam("pike", "sampling_time_unit", 1)
modparam("pike", "reqs_density_per_unit", PIKE_THRESHOLD)
modparam("pike", "remove_latency", PIKE_TIMEOUT)

# ----- Hash Tables -----
# Blocked IPs (auto-expire after 300 seconds)
modparam("htable", "htable", "blocked=>size=12;autoexpire=300")
# Failed auth tracking for scanner detection
modparam("htable", "htable", "failedauth=>size=12;autoexpire=3600")
# IP reputation
modparam("htable", "htable", "ipreputation=>size=12;autoexpire=86400")
# Call tracking per IP
modparam("htable", "htable", "ipcalls=>size=12;autoexpire=60")

# ----- Dispatcher (Load Balancing) -----
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
# Failover support
modparam("dispatcher", "flags", 2)
# XAVP-based destination and context (Kamailio 5.8+ style)
modparam("dispatcher", "xavp_dst", "ds_dst")
modparam("dispatcher", "xavp_ctx", "ds_ctx")
# Ping every 5 seconds
modparam("dispatcher", "ds_ping_interval", 5)
# Probe inactive gateways
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_from", "sip:ping@voiceplatform.local")
# 3 failures = inactive
modparam("dispatcher", "ds_probing_threshold", 3)
# 3 successes = active
modparam("dispatcher", "ds_inactive_threshold", 3)
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=404;code=480")

# ----- Dialog Module -----
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "timeout_avp", "$avp(dlg_timeout)")
# 12 hour max call
modparam("dialog", "default_timeout", 43200)
modparam("dialog", "profiles_with_value", "caller")
# No DB persistence (stateless SBC)
modparam("dialog", "db_mode", 0)

# ----- NAT Helper -----
# NAT pinging disabled — SBC mode, no registered endpoints to ping
modparam("nathelper", "natping_interval", 0)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# ----- RTPEngine (Media Proxy) -----
# Use rtpengine for proper RTP handling - comment out if not using
#modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
#modparam("rtpengine", "rtpengine_disable_tout", 30)

# ----- Topology Hiding -----
# Replaces internal IPs (172.28.x.x) in Via/Record-Route/Contact with mask_ip
# This prevents Bandwidth from seeing Docker internal network topology
modparam("topoh", "mask_key", "VoicePlatformSecretKey2024")
modparam("topoh", "mask_ip", "34.74.71.32")
modparam("topoh", "mask_callid", 1)
modparam("topoh", "uparam_name", "toph")
modparam("topoh", "uparam_prefix", "sr-")

# ----- UAC (User Agent Client) -----
modparam("uac", "restore_mode", "auto")

#!ifdef WITH_TLS
# ----- TLS Module -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")
modparam("tls", "tls_force_run", 1)
#!endif

####### Routing Logic ########

# Main request route
request_route {
    # Per-request logging
    xlog("L_INFO", ">>> $rm from $fu ($si:$sp) to $ru\n");

    # Enforce max forwards
    if (!mf_process_maxfwd_header("10")) {
        xlog("L_WARN", "Too many hops: $fu -> $ru\n");
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Determine if source is trusted (Bandwidth carrier or internal FreeSWITCH)
    # Flag 5 = trusted source (skip rate limiting and attack detection)
    if ($si == BANDWIDTH_IP_1 || $si == BANDWIDTH_IP_2 || is_in_subnet($si, BANDWIDTH_NET_1) || is_in_subnet($si, BANDWIDTH_NET_2)) {
        setflag(5);
        xlog("L_INFO", "Trusted source: Bandwidth $si\n");
    } else if (is_in_subnet($si, DOCKER_NETWORK) || is_in_subnet($si, LOCALHOST_NETWORK)) {
        setflag(5);  # Trusted: Docker internal network (FreeSWITCH)
        xlog("L_DEBUG", "Trusted source: Docker internal $si\n");
    }

    # Check if source IP is blocked (skip for trusted sources)
    if (!isflagset(5) && $sht(blocked=>$si) != $null) {
        xlog("L_WARN", "Blocked IP attempt: $si\n");
        # Silently drop - don't even respond (makes scanning harder)
        exit;
    }

    # Sanity checks - detect malformed SIP (always check, even trusted)
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp - $rm\n");
        if (!isflagset(5)) {
            $sht(ipreputation=>$si) = $sht(ipreputation=>$si) + 1;
            if ($sht(ipreputation=>$si) > 10) {
                $sht(blocked=>$si) = 1;
                xlog("L_WARN", "Blocking IP due to malformed SIP: $si\n");
            }
        }
        exit;
    }

    # Rate limiting with pike - SKIP for trusted sources (Bandwidth, FreeSWITCH)
    if (!isflagset(5)) {
        if (!pike_check_req()) {
            xlog("L_WARN", "Rate limit exceeded: $si ($rm)\n");
            $sht(blocked=>$si) = 1;
            sl_send_reply("503", "Service Unavailable - Rate Limited");
            exit;
        }

        # Scanner/attack detection - only for untrusted sources
        route(SCANNER_DETECT);
    }

    # CANCEL handling - must be processed before t_precheck_trans
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Retransmission handling
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Handle in-dialog requests (BYE, re-INVITE, etc.)
    if (has_totag()) {
        route(WITHINDIALOG);
        exit;
    }

    # ---- Initial requests (no to-tag) ----

    # Record route for dialog-initiating requests so Kamailio stays in
    # the signaling path for in-dialog requests (BYE, re-INVITE, etc.)
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle REGISTER - we don't accept registrations (Bandwidth uses IP auth)
    if (is_method("REGISTER")) {
        xlog("L_INFO", "Rejecting REGISTER from $si\n");
        sl_send_reply("403", "Forbidden - Registration Not Accepted");
        exit;
    }

    # Handle OPTIONS - respond for health checks
    if (is_method("OPTIONS")) {
        if (!isflagset(5)) {
            # Track OPTIONS floods (scanner behavior) only from untrusted sources
            $sht(ipcalls=>$si::options) = $sht(ipcalls=>$si::options) + 1;
            if ($sht(ipcalls=>$si::options) > OPTIONS_FLOOD_THRESHOLD) {
                xlog("L_WARN", "OPTIONS flood from $si - blocking\n");
                $sht(blocked=>$si) = 1;
                exit;
            }
        }
        sl_send_reply("200", "OK");
        exit;
    }

    # Reject unsupported methods
    if (!is_method("INVITE|ACK|BYE|CANCEL|PRACK|NOTIFY|REFER|MESSAGE|SUBSCRIBE|UPDATE|INFO")) {
        xlog("L_WARN", "Unsupported method $rm from $si\n");
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # --- Source-based INVITE routing ---
    if (is_method("INVITE")) {
        # NAT detection and handling
        route(NAT_DETECT);

        # Set dialog flag for tracking
        setflag(4);

        if ($si == BANDWIDTH_IP_1 || $si == BANDWIDTH_IP_2 || is_in_subnet($si, BANDWIDTH_NET_1) || is_in_subnet($si, BANDWIDTH_NET_2)) {
            # INBOUND: Bandwidth -> Kamailio -> FreeSWITCH
            xlog("L_INFO", "Inbound INVITE from Bandwidth ($si) to $rU\n");
            route(DISPATCH);
        } else if (is_in_subnet($si, DOCKER_NETWORK) || is_in_subnet($si, LOCALHOST_NETWORK)) {
            # Distinguish FreeSWITCH (outbound) from SIPp/test tools (inbound test)
            # FreeSWITCH sends User-Agent: VoicePlatform/1.0 or FreeSWITCH
            # SIPp sends User-Agent: SIPp (or similar)
            if ($ua =~ "VoicePlatform" || $ua =~ "FreeSWITCH") {
                # OUTBOUND: FreeSWITCH -> Kamailio -> Bandwidth
                xlog("L_INFO", "Outbound INVITE from FreeSWITCH ($si) to $rU via $du\n");
                route(TO_CARRIER);
            } else {
                # TEST TRAFFIC: SIPp or other internal test tools -> treat as inbound
                xlog("L_INFO", "Test INVITE from $si (UA: $ua) to $rU - dispatching to FreeSWITCH\n");
                route(DISPATCH);
            }
        } else {
            # UNKNOWN source - reject
            xlog("L_WARN", "INVITE from untrusted source: $si\n");
            sl_send_reply("403", "Forbidden");
            exit;
        }
        exit;
    }

    # Non-INVITE initial requests from untrusted sources
    if (!isflagset(5)) {
        xlog("L_WARN", "Non-INVITE initial request $rm from untrusted $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Other initial requests from trusted sources - dispatch to FreeSWITCH
    route(DISPATCH);
}

# Within-dialog request handling
route[WITHINDIALOG] {
    if (!loose_route()) {
        # Not a properly routed request
        if (is_method("ACK")) {
            # ACK without Route - check if we have the transaction
            if (t_check_trans()) {
                route(RELAY);
                exit;
            }
            # Orphan ACK - drop silently
            exit;
        }
        xlog("L_WARN", "In-dialog $rm without Route from $si\n");
        sl_send_reply("404", "Not Found");
        exit;
    }

    # Validate dialog exists (if using dialog module)
    if (is_method("BYE|CANCEL")) {
        xlog("L_INFO", "$rm in dialog: $ci\n");
    }

    # Handle re-INVITEs (hold, codec changes, etc.)
    if (is_method("INVITE")) {
        # NAT handling for re-INVITE
        route(NAT_DETECT);
        record_route();
    }

    # Sequential request - relay it
    route(RELAY);
    exit;
}

# NAT detection and handling
# Ensures external-facing SIP headers show the public IP, not Docker internal IPs
route[NAT_DETECT] {
    force_rport();

    if (nat_uac_test("19")) {  # Check private IP in Contact, Via received
        xlog("L_DEBUG", "NAT detected for $si\n");
        setbflag(6);  # Mark as NATted

        # Fix Contact header to use public IP
        if (is_method("INVITE|REGISTER|SUBSCRIBE")) {
            fix_nated_contact();
        }

        # Store original source for later
        $avp(RECEIVED) = $su;
    }
}

# Scanner/Attack detection
route[SCANNER_DETECT] {
    # Track authentication failures
    # This would be called after auth failure - placeholder for when we add auth

    # Detect INVITE floods (likely scanner or DoS)
    if (is_method("INVITE")) {
        $sht(ipcalls=>$si::inv) = $sht(ipcalls=>$si::inv) + 1;
        if ($sht(ipcalls=>$si::inv) > 30) {  # 30 INVITE/minute is suspicious
            xlog("L_WARN", "INVITE flood detected from $si\n");
            $sht(blocked=>$si) = 1;
            sl_send_reply("503", "Service Unavailable");
            exit;
        }
    }

    # Detect scanning patterns (sequential destinations)
    # Would need more sophisticated tracking in production
}

# Dispatch to FreeSWITCH (inbound from carrier)
route[DISPATCH] {
    # Select FreeSWITCH instance using dispatcher
    # Algorithm 4 = round-robin, 10 = weight-based, 11 = call-load
    if (!ds_select_dst("1", "4")) {
        xlog("L_ERR", "No FreeSWITCH available for $rm to $rU\n");
        sl_send_reply("503", "Service Unavailable - No Media Servers");
        exit;
    }

    xlog("L_INFO", "Dispatching to FreeSWITCH: $du\n");

    # Set failure route for failover
    t_on_failure("DISPATCH_FAILURE");

    route(RELAY);
}

# Route outbound to Bandwidth carrier (from FreeSWITCH)
route[TO_CARRIER] {
    # FreeSWITCH sets the R-URI with the destination. If it already points
    # to a Bandwidth IP, just relay it. Otherwise, route to primary Bandwidth IP.
    # FreeSWITCH typically constructs the full outbound URI (e.g., sip:+15551234567@67.231.2.12)
    # so we relay as-is. If $rd is not a Bandwidth IP, fix it.

    if ($rd != BANDWIDTH_IP_1 && $rd != BANDWIDTH_IP_2) {
        # Rewrite R-URI domain to Bandwidth IP (carrier expects their domain, not Docker internal)
        $rd = BANDWIDTH_IP_1;
        $rp = 5060;
        $du = "sip:" + BANDWIDTH_IP_1 + ":5060";
        xlog("L_INFO", "Outbound to Bandwidth: rewriting R-URI domain and dst to $du\n");
    }

    xlog("L_INFO", "Routing outbound to carrier: $ru (via $du)\n");

    t_on_failure("CARRIER_FAILURE");
    route(RELAY);
}

# Failure route for outbound carrier
failure_route[CARRIER_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    xlog("L_WARN", "Carrier delivery failed: $rs $rr to $ru\n");

    # If primary Bandwidth IP failed, try secondary
    if (t_check_status("500|503|408|480|404")) {
        if ($rd == BANDWIDTH_IP_1) {
            $rd = BANDWIDTH_IP_2;
            $rp = 5060;
            $du = "sip:" + BANDWIDTH_IP_2 + ":5060";
            xlog("L_WARN", "Failover to secondary Bandwidth IP: $du\n");
            t_on_failure("CARRIER_FAILURE");
            t_relay();
            exit;
        }
    }

    xlog("L_ERR", "All carrier endpoints failed for $ru\n");
}

# Relay route - send the request
route[RELAY] {
    # Enable topology hiding for outbound
    # This masks internal IPs in Via/Contact/Record-Route
    # Note: topoh module handles this automatically if loaded

    if (is_method("INVITE")) {
        # Set branch failure handling
        t_on_branch("BRANCH_FAILURE");
        t_on_reply("REPLY_HANDLER");
    }

    if (!t_relay()) {
        xlog("L_ERR", "Relay failed for $rm to $ru\n");
        sl_reply_error();
    }
    exit;
}

# Reply handling
# Fix NAT in replies so external-facing responses show public IP
reply_route {
    xlog("L_INFO", "<<< $rs $rr for $rm\n");

    # NAT handling for replies - fix Contact if it contains a private/Docker IP
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }

    # Drop late 100 Trying (unnecessary network traffic)
    if (status == "100" && $T(id_label) != $null) {
        drop;
        exit;
    }
}

# Branch failure handler
branch_route[BRANCH_FAILURE] {
    xlog("L_DEBUG", "Branch to $ru\n");
}

# Reply handler for INVITE
onreply_route[REPLY_HANDLER] {
    xlog("L_INFO", "Reply $rs for INVITE\n");

    # Handle NAT for 200 OK (contains SDP)
    if (status =~ "^[12][0-9][0-9]$") {
        if (nat_uac_test("1")) {
            fix_nated_contact();
        }
    }

    # RTP proxy handling would go here if using rtpengine
    # if (has_body("application/sdp")) {
    #     rtpengine_answer();
    # }
}

# Failure route for dispatcher failover
failure_route[DISPATCH_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    # Log the failure
    xlog("L_WARN", "Dispatch failed: $rs $rr\n");

    # Check if we should failover
    if (t_check_status("500|503|408")) {
        # Try next FreeSWITCH
        if (ds_next_dst()) {
            xlog("L_WARN", "Failover to $du\n");

            # Mark the failed destination as probing
            ds_mark_dst("p");

            t_on_failure("DISPATCH_FAILURE");
            t_relay();
            exit;
        }
    }

    # No more destinations or non-recoverable error
    xlog("L_ERR", "All FreeSWITCH instances failed\n");

    # Return appropriate error to caller
    if (t_check_status("4[0-9][0-9]")) {
        # 4xx - client error, pass through
        exit;
    }

    send_reply("503", "Service Unavailable");
}

# Event route for dialog end
event_route[dialog:end] {
    xlog("L_INFO", "Dialog ended: $ci duration=$DLG_lifetime\n");
}

# Stats route for monitoring
event_route[htable:mod-init] {
    xlog("L_INFO", "Hash tables initialized\n");
}
