server {
    listen 80;
    server_name _;

    # Docker DNS resolver — needed for variable-based proxy_pass
    # so nginx doesn't crash at startup when optional services are down
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Homer API proxy (must be before /api/ to take priority) ---
    # Homer's Angular app calls /api/v3/ for its backend.
    # This must come before the generic /api/ block.
    location /api/v3/ {
        set $homer_upstream http://homer-webapp:80;
        proxy_pass         $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
        proxy_read_timeout  120s;
        proxy_send_timeout  30s;
        proxy_buffering     off;
    }

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        set $sipp_upstream http://sipp:8001;
        proxy_pass $sipp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Homer SIP Capture reverse proxy ---
    # Proxies Homer webapp so it's same-origin with the React app.
    # This avoids X-Frame-Options / CSP issues when embedding in an iframe.
    # Homer's Angular app expects to be served from /, so we:
    #   1. Strip /homer/ prefix before forwarding
    #   2. Rewrite <base href="/"> to <base href="/homer/"> so Angular
    #      routing and relative asset paths resolve correctly
    #   3. Remove X-Frame-Options as a belt-and-suspenders measure
    location /homer/ {
        set $homer_upstream http://homer-webapp:80;
        rewrite ^/homer/(.*)$ /$1 break;
        proxy_pass         $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Force upstream to send uncompressed so sub_filter can rewrite HTML
        proxy_set_header   Accept-Encoding  "";

        # Remove framing restrictions from Homer's responses
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        # Rewrite Angular base href so routing/assets work under /homer/
        sub_filter_once    on;
        sub_filter         '<base href="/"' '<base href="/homer/"';

        # WebSocket support (Homer may use WS for live capture)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
        # proxy_buffering must remain ON (the default) so that sub_filter can
        # rewrite the <base href> in Homer's HTML.  With buffering off, nginx
        # streams bytes straight through and the sub_filter is silently skipped,
        # leaving base href="/" intact.  Angular then requests assets without the
        # /homer/ prefix, they fall through to the SPA catch-all, and the browser
        # gets index.html (text/html) instead of the JS module — producing the
        # "MIME type mismatch" error seen in the console.
    }

    # Redirect /homer (no trailing slash) to /homer/ for consistency
    location = /homer {
        return 301 /homer/;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # --- Unified asset resolution ---
    # Instead of dozens of individual location blocks trying to match every
    # Homer Angular asset pattern (and inevitably missing new ones), we use
    # a single catch-all strategy:
    #
    #   1. try_files $uri  — serve if it exists on disk (React static files)
    #   2. @homer_proxy    — proxy to Homer; if Homer has the asset, serve it
    #   3. @spa_fallback   — Homer returned 404, so it's a React SPA route
    #
    # This eliminates the whack-a-mole problem: ANY Homer asset (lazy chunks,
    # web workers, fonts, translations, images, moment.js chunks, etc.) is
    # automatically proxied without needing an explicit pattern for each one.
    location / {
        # Serve static files from disk, fall back to SPA index.html for client-side routing.
        # Homer assets are handled by @homer_proxy only when explicitly needed
        # (Homer's Angular chunks don't exist on this disk, so they'll 404 to index.html
        # which is fine — Homer is loaded in an iframe at /homer/ anyway).
        try_files $uri $uri/ /index.html;
    }

    # Named location: proxy unresolved paths to Homer webapp.
    # If Homer serves the asset, great. If Homer returns 404, nginx intercepts
    # the error and falls through to the React SPA.
    location @homer_proxy {
        set $homer_upstream http://homer-webapp:80;
        proxy_pass         $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Remove framing restrictions (these assets load inside the Homer iframe)
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        # Intercept Homer's error responses so we can fall through to the SPA
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # Named location: React SPA catch-all.
    # If neither a static file on disk nor a Homer asset matched, this is a
    # React Router path — serve index.html and let client-side routing handle it.
    location @spa_fallback {
        rewrite ^ /index.html last;
    }
}
