server {
    listen 80;
    server_name _;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Homer API proxy (must be before /api/ to take priority) ---
    # Homer's Angular app calls /api/v3/ for its backend.
    # This must come before the generic /api/ block.
    location /api/v3/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        proxy_pass         http://sipp:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Homer SIP Capture reverse proxy ---
    # Proxies Homer webapp so it's same-origin with the React app.
    # This avoids X-Frame-Options / CSP issues when embedding in an iframe.
    # Homer's Angular app expects to be served from /, so we:
    #   1. Strip /homer/ prefix before forwarding
    #   2. Rewrite <base href="/"> to <base href="/homer/"> so Angular
    #      routing and relative asset paths resolve correctly
    #   3. Remove X-Frame-Options as a belt-and-suspenders measure
    location /homer/ {
        rewrite ^/homer/(.*)$ /$1 break;
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Force upstream to send uncompressed so sub_filter can rewrite HTML
        proxy_set_header   Accept-Encoding  "";

        # Remove framing restrictions from Homer's responses
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        # Rewrite Angular base href so routing/assets work under /homer/
        sub_filter_once    on;
        sub_filter_types   text/html;
        sub_filter         '<base href="/"' '<base href="/homer/"';

        # WebSocket support (Homer may use WS for live capture)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # Redirect /homer (no trailing slash) to /homer/ for consistency
    location = /homer {
        return 301 /homer/;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # --- Homer Angular assets at root level ---
    # Homer's index.html references JS/CSS with root-relative paths.
    # Catch Angular hashed bundles, translation files, fonts, and images.
    location ~ ^/(runtime|polyfills|main|styles|vendor|scripts)\.[a-f0-9]+\.(js|css)(\.map)?$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
    }

    # Homer translation files (both /en.json and /assets/i18n/en.json)
    location ~ ^/(en|de|fr|it|es|pt|ru|zh|ja|ko)\.json$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /assets/i18n/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer images (PNG, SVG) at root level
    location ~ ^/homer[^/]*\.(png|svg|ico)$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer assets under /assets/ that aren't our React app's assets
    # Our React assets have hashed names (index-BcGdhx9h.js), Homer's don't collide
    location /assets/images/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /assets/icons/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer font files (Roboto, etc.)
    location ~ ^/Roboto[^/]*\.(woff2?|ttf|eot)$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer misc assets (KFO fonts, fIUh fonts, i18n, etc.)
    location ~ ^/(KFO|fIU)[^/]*$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- React SPA fallback ---
    # All other paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
