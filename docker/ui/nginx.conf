server {
    listen 80;
    server_name _;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Homer API proxy (must be before /api/ to take priority) ---
    # Homer's Angular app calls /api/v3/ for its backend.
    # This must come before the generic /api/ block.
    location /api/v3/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        proxy_pass         http://sipp:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Homer SIP Capture reverse proxy ---
    # Proxies Homer webapp so it's same-origin with the React app.
    # This avoids X-Frame-Options / CSP issues when embedding in an iframe.
    # Homer's Angular app expects to be served from /, so we:
    #   1. Strip /homer/ prefix before forwarding
    #   2. Rewrite <base href="/"> to <base href="/homer/"> so Angular
    #      routing and relative asset paths resolve correctly
    #   3. Remove X-Frame-Options as a belt-and-suspenders measure
    location /homer/ {
        rewrite ^/homer/(.*)$ /$1 break;
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Force upstream to send uncompressed so sub_filter can rewrite HTML
        proxy_set_header   Accept-Encoding  "";

        # Remove framing restrictions from Homer's responses
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        # Rewrite Angular base href so routing/assets work under /homer/
        sub_filter_once    off;
        sub_filter_types   text/html;
        sub_filter         '<base href="/"' '<base href="/homer/"';

        # Inject dark theme CSS to match our app's color palette
        sub_filter '</head>' '<style>
          body, .mat-app-background, .mat-drawer-container { background: #0f1117 !important; color: #e2e8f0 !important; }
          .mat-toolbar, .mat-toolbar.mat-primary { background: #13151d !important; color: #e2e8f0 !important; border-bottom: 1px solid rgba(42,47,69,0.6) !important; }
          .mat-card, .mat-expansion-panel, .mat-dialog-container { background: #1a1d27 !important; color: #e2e8f0 !important; border: 1px solid rgba(42,47,69,0.6) !important; }
          .mat-drawer, .mat-sidenav { background: #13151d !important; color: #e2e8f0 !important; border-right: 1px solid rgba(42,47,69,0.6) !important; }
          .mat-form-field-appearance-legacy .mat-form-field-underline, .mat-form-field-underline { background-color: rgba(42,47,69,0.6) !important; }
          .mat-input-element, .mat-select-value, .mat-option-text { color: #e2e8f0 !important; }
          .mat-form-field-label, .mat-hint { color: #718096 !important; }
          .mat-table, .mat-header-row, .mat-row { background: transparent !important; }
          .mat-header-cell { color: #718096 !important; border-bottom-color: rgba(42,47,69,0.6) !important; }
          .mat-cell { color: #e2e8f0 !important; border-bottom-color: rgba(42,47,69,0.4) !important; }
          .mat-row:hover { background: rgba(59,130,246,0.06) !important; }
          .mat-paginator { background: #13151d !important; color: #718096 !important; }
          .mat-select-panel, .mat-autocomplete-panel, .mat-menu-panel, .mat-option { background: #1a1d27 !important; color: #e2e8f0 !important; }
          .mat-option:hover, .mat-option.mat-active { background: rgba(59,130,246,0.1) !important; }
          .mat-tab-label { color: #718096 !important; } .mat-tab-label-active { color: #e2e8f0 !important; }
          .mat-tab-group, .mat-tab-body-wrapper { background: transparent !important; }
          .mat-chip { background: #1e2130 !important; color: #e2e8f0 !important; border: 1px solid rgba(42,47,69,0.6) !important; }
          .mat-button, .mat-icon-button, .mat-stroked-button { color: #e2e8f0 !important; }
          .mat-flat-button.mat-primary, .mat-raised-button.mat-primary, .mat-fab.mat-primary { background: #3b82f6 !important; }
          .widget-container, .widget-item, [class*="widget"] { background: #1a1d27 !important; border-color: rgba(42,47,69,0.6) !important; }
          .panel, .panel-body, .card-body { background: #1a1d27 !important; }
          h1, h2, h3, h4, h5, h6, label, span, p, div, a { color: inherit; }
          .mat-icon { color: #718096 !important; }
          .mat-divider { border-color: rgba(42,47,69,0.6) !important; }
          .cdk-overlay-pane .mat-dialog-container { background: #1a1d27 !important; }
          ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f1117; } ::-webkit-scrollbar-thumb { background: #2a2f45; border-radius: 4px; }
        </style></head>';

        # WebSocket support (Homer may use WS for live capture)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # Redirect /homer (no trailing slash) to /homer/ for consistency
    location = /homer {
        return 301 /homer/;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # --- Homer Angular assets at root level ---
    # Homer's index.html references JS/CSS with root-relative paths.
    # Catch Angular hashed bundles, translation files, fonts, and images.
    location ~ ^/(runtime|polyfills|main|styles|vendor|scripts)\.[a-f0-9]+\.(js|css)(\.map)?$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
    }

    # Homer translation files (both /en.json and /assets/i18n/en.json)
    location ~ ^/(en|de|fr|it|es|pt|ru|zh|ja|ko)\.json$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /assets/i18n/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer images (PNG, SVG) at root level
    location ~ ^/homer[^/]*\.(png|svg|ico)$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer assets under /assets/ that aren't our React app's assets
    # Our React assets have hashed names (index-BcGdhx9h.js), Homer's don't collide
    location /assets/images/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /assets/icons/ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer font files (Roboto, etc.)
    location ~ ^/Roboto[^/]*\.(woff2?|ttf|eot)$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Homer misc assets (KFO fonts, fIUh fonts, i18n, etc.)
    location ~ ^/(KFO|fIU)[^/]*$ {
        proxy_pass         http://homer-webapp:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- React SPA fallback ---
    # All other paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
