server {
    listen 80;
    server_name _;

    # Serve the single-page UI
    root /usr/share/nginx/html;
    index index.html;

    # --- API proxy ---
    # Forward any path starting with /rcf, /customers, /health, /calls
    # to the FastAPI backend container named "api" on port 8000.
    location ~ ^/(rcf|customers|health|calls|trunks|cdrs|tiers|api-dids|rates|ivr|v1)(/.*)?$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow PUT/DELETE with special characters like + in DID paths
        proxy_pass_request_headers on;

        # Reasonable timeouts for API calls
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- SIPp test runner proxy ---
    location ~ ^/sipp(/.*)?$ {
        proxy_pass         http://sipp:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Static UI fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log noise for health checks
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
