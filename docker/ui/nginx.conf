server {
    listen 80;
    server_name _;

    # Docker DNS resolver — needed for variable-based proxy_pass
    # so nginx doesn't crash at startup when optional services are down
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Homer API proxy (must be before /api/ to take priority) ---
    # Homer's Angular app calls /api/v3/ for its backend.
    # This must come before the generic /api/ block.
    location /api/v3/ {
        set $homer_upstream http://homer-webapp:80;
        proxy_pass         $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
        proxy_read_timeout  120s;
        proxy_send_timeout  30s;
        proxy_buffering     off;
    }

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        set $sipp_upstream http://sipp:8001;
        proxy_pass $sipp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Homer SIP Capture — fully static, no proxy ---
    # Homer's entire dist is baked into the image at /usr/share/nginx/html/homer/.
    # nginx serves every asset (JS chunks, CSS, fonts, translations) as a static
    # file with the correct Content-Type — no proxy, no GCP LB interference.
    #
    # The index.html was patched at build time with PREFIX: "/homer/" which sets
    # base href="/homer/". Angular's relative script src="runtime.xxx.js" therefore
    # resolves to /homer/runtime.xxx.js, which nginx finds on disk immediately.
    #
    # Only Homer's backend API calls (/api/v3/) still go to homer-webapp — those
    # are handled by the /api/v3/ block above.

    # Redirect /homer (no trailing slash) to /homer/ for consistency
    location = /homer {
        return 301 /homer/;
    }

    # Serve Homer's index for the root path. No-store prevents stale caching
    # after a container update that changes the hashed asset filenames.
    location = /homer/ {
        try_files /homer/index.html =404;
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "";
    }

    # Serve all Homer static assets directly from disk.
    # try_files $uri: nginx looks for the file at the path relative to root
    # (/usr/share/nginx/html). /homer/runtime.xxx.js is on disk — served.
    # =404 is the terminal fallback; Homer's Angular router handles its own
    # deep-link routes via the index.html catch (not needed here since Homer
    # runs inside an iframe and doesn't use browser-history-based deep links
    # in a way that would produce a 404 at this nginx level).
    location /homer/ {
        try_files $uri =404;
        add_header X-Frame-Options "";

        # Long-lived cache for hashed assets; no-store for the index (handled above).
        # Angular CLI emits content-hashed filenames for all bundles, so a 1-year
        # cache is safe — the hash changes when content changes.
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|json)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "";
        }
    }

    # --- React SPA catch-all ---
    # Serve static files from disk; fall back to index.html for client-side routing.
    # Homer assets are no longer served here — they live under /homer/ above.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
