# --- Dual HTTP + HTTPS ---
# Port 80: serves the full app over HTTP (needed for GCP Load Balancer backend).
# Port 443: serves the same app over HTTPS (needed for WebRTC getUserMedia).
# No redirect — both ports serve content so the LB path and direct HTTPS both work.
server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Docker DNS resolver — needed for variable-based proxy_pass
    # so nginx doesn't crash at startup when optional services are down
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Homer API proxy (must be before /api/ to take priority) ---
    # Homer's Angular app calls /api/v3/ for its backend.
    # This must come before the generic /api/ block.
    location /api/v3/ {
        set $homer_upstream http://homer-webapp:80;
        proxy_pass         $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
        proxy_read_timeout  120s;
        proxy_send_timeout  30s;
        proxy_buffering     off;
    }

    # --- WebSocket proxy (chat, presence) ---
    # Must come before /api/ so WebSocket upgrades are handled with proper headers.
    # TLS terminates here — backend proxy_pass stays http:// (wss→ws unwrap).
    location /api/ws/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        set $sipp_upstream http://sipp:8001;
        proxy_pass $sipp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Homer SIP Capture ---
    # Homer's JS is served dynamically by its Go binary so we cannot bake all
    # assets into this container as static files. Instead:
    #
    #   1. The exact /homer/ request is answered with OUR patched index.html
    #      (baked in at build time with PREFIX: "/homer/"). This gives the browser
    #      a base href of /homer/ without any sub_filter rewriting — no GCP LB
    #      gzip interference.
    #
    #   2. Every other /homer/* request (JS bundles, CSS, fonts, API calls) is
    #      proxied to homer-webapp with the /homer/ prefix stripped, so homer-webapp
    #      sees the same paths it would serve on its own (e.g. /runtime.*.js).
    #
    # The /api/v3/ block above handles Homer's backend API calls separately.

    # Redirect /homer (no trailing slash) to /homer/ for consistency
    location = /homer {
        return 301 /homer/;
    }

    # Serve our patched Homer index.html (has PREFIX: "/homer/").
    # No-store prevents stale caching after container updates that change
    # hashed asset filenames.
    location = /homer/ {
        try_files /homer/index.html =404;
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "";
    }

    # Proxy ALL other /homer/* requests to homer-webapp.
    # This covers JS bundles, CSS, fonts, translations, and any API paths
    # not already matched by /api/v3/ above.
    location /homer/ {
        set $homer_upstream http://homer-webapp:80;
        rewrite ^/homer/(.*)$ /$1 break;
        proxy_pass $homer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Remove framing restrictions that homer-webapp may set
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # --- React SPA catch-all ---
    # Serve static files from disk; fall back to index.html for client-side routing.
    # Homer assets are no longer served here — they live under /homer/ above.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
