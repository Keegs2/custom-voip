server {
    listen 80;
    server_name _;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- API proxy ---
    # React app calls /api/rcf, /api/customers, etc.
    # Strip /api prefix and proxy to FastAPI backend on port 8000.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # --- FastAPI docs (direct, no /api prefix) ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SIPp test runner ---
    location /api/sipp/ {
        rewrite ^/api/sipp/(.*)$ /sipp/$1 break;
        proxy_pass         http://sipp:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
    }

    # --- Health check (no prefix, for load balancer) ---
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # --- React SPA fallback ---
    # All other paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
