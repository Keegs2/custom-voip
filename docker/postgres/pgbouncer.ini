# PgBouncer Configuration - Optimized for High-Volume Voice
# Connection pooling reduces connection overhead dramatically

[databases]
voip = host=127.0.0.1 port=5432 dbname=voip pool_size=100 reserve_pool=20

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Transaction pooling - best for short queries (call lookups)
pool_mode = transaction

# Connection limits
max_client_conn = 1000
default_pool_size = 100
reserve_pool_size = 20
reserve_pool_timeout = 3

# Performance settings
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Stats
stats_period = 60

# Server connection reuse
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30
