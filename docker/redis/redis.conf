# Redis Configuration - Optimized for High-Volume Voice Platform
# Focus: Low latency, high throughput, atomic operations

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Performance - allocate substantial memory
maxmemory 2gb
maxmemory-policy volatile-lru

# Disable disk persistence for maximum speed (data is ephemeral)
# Channel counts, velocity data can be rebuilt from call state
save ""
appendonly no

# Reduce latency
activerehashing yes
hz 100
dynamic-hz yes

# Threading for I/O (Redis 7+)
io-threads 4
io-threads-do-reads yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Lua scripting
lua-time-limit 100

# Logging
loglevel warning
logfile ""

# Disable slow commands that could block
rename-command KEYS ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""

# Latency monitoring
latency-monitor-threshold 10
